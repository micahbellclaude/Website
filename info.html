<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info — Micah Bell</title>
  <link rel="icon" type="image/png" href="images/MB-Favicon.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --orange: #FF6B00;
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #e8e8e8;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 2.5rem;
    }

    .nav-back {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    .nav-back:hover { color: var(--orange); }

    .info-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2.5rem 8rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
      animation: fadeUp 0.5s ease both;
    }

    @media (max-width: 600px) {
      .info-content { grid-template-columns: 1fr; gap: 2rem; }
    }

    .info-text h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 2rem;
    }

    .info-text h1 span { color: var(--orange); }

    .info-text p {
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.7;
      opacity: 0.65;
      margin-bottom: 2rem;
    }

    .info-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .info-links a {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    .info-links a:hover { color: var(--orange); }

    .info-photo {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--gray);
      /* Replace with: background: url('images/micah.jpg') center/cover; */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.3;
    }

    footer {
      margin-top: auto;
      width: 100%;
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1.5px solid var(--gray);
    }

    footer span {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    footer a {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      opacity: 0.4;
      transition: opacity 0.15s, color 0.15s;
    }

    footer a:hover { opacity: 1; color: var(--orange); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-back">← All Work</a>
  </nav>

  <div class="info-content">
    <div class="info-text">
      <h1>Micah<br><span>Bell</span></h1>
      <p>
        Micah Bell works in San Antonio, TX.
      </p>
      <!-- Add your bio here -->
      <p>
        [Your bio here]
      </p>
      <div class="info-links">
        <a href="mailto:info@micahbellart.com">info@micahbellart.com</a>
        <a href="https://twitter.com/micahbell" target="_blank">Twitter</a>
        <a href="https://instagram.com/micahbellart" target="_blank">Instagram</a>
      </div>
    </div>
    <div class="info-photo">Photo</div>
  </div>

  <footer>
    <img src="images/MB-Footer.png" alt="Micah Bell" />
  </footer>

</body>
</html>
