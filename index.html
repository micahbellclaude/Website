<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micah Bell</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --orange: #FF6B00;
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #e8e8e8;
    }

    html {
      font-size: 16px;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* NAV */
    nav {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 2rem 2.5rem;
      gap: 2rem;
    }

    nav a {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    nav a:hover {
      color: var(--orange);
    }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem 5rem;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      font-size: clamp(5rem, 14vw, 10rem);
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--black);
      margin-bottom: 0.1em;
    }

    .logo span {
      color: var(--orange);
    }

    .tagline {
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      margin-top: 0.5rem;
      opacity: 0.5;
    }

    /* PROJECT LIST */
    .projects {
      width: 100%;
      max-width: 900px;
      padding: 2rem 2rem 8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .project-link {
      display: block;
      width: 100%;
      text-decoration: none;
      color: var(--black);
      border-top: 1.5px solid var(--gray);
      padding: 1.4rem 0;
      transition: color 0.15s;
      animation: fadeUp 0.6s ease both;
    }

    .project-link:last-child {
      border-bottom: 1.5px solid var(--gray);
    }

    .project-link:hover {
      color: var(--orange);
    }

    .project-link:hover .arrow {
      transform: translateX(6px);
      color: var(--orange);
    }

    .project-inner {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.6rem;
    }

    .project-title {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .arrow {
      font-size: 1.2rem;
      transition: transform 0.2s ease, color 0.15s;
      color: var(--black);
      opacity: 0.3;
    }

    .project-link:hover .arrow {
      opacity: 1;
    }

    /* Staggered animation delays */
    .project-link:nth-child(1) { animation-delay: 0.05s; }
    .project-link:nth-child(2) { animation-delay: 0.1s; }
    .project-link:nth-child(3) { animation-delay: 0.15s; }
    .project-link:nth-child(4) { animation-delay: 0.2s; }
    .project-link:nth-child(5) { animation-delay: 0.25s; }
    .project-link:nth-child(6) { animation-delay: 0.3s; }
    .project-link:nth-child(7) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* FOOTER */
    footer {
      margin-top: auto;
      width: 100%;
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1.5px solid var(--gray);
    }

    footer span {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    footer a {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      opacity: 0.4;
      transition: opacity 0.15s, color 0.15s;
    }

    footer a:hover {
      opacity: 1;
      color: var(--orange);
    }
  </style>
</head>
<body>

  <nav>
    <a href="info.html">Info</a>
    <a href="https://instagram.com/micahbellart" target="_blank">Instagram</a>
    <a href="https://twitter.com/micahbell" target="_blank">Twitter</a>
  </nav>

  <div class="hero">
    <div class="logo">?<span>M</span></div>
    <div class="tagline">Thank you for your attention.</div>
  </div>

  <div class="projects">

    <a href="projects/here-come-the-blade-runners.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Here Come The Blade Runners</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/the-membership.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">The Membership</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/real-emotion.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Real Emotion</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/miscellaneous-artwork.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Miscellaneous Artwork</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/miscellaneous-gifs.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Miscellaneous GIFs</span>
        <span class="arrow">→</span>
      </div>
    </a>

  </div>

  <footer>
    <span>Micah Bell — San Antonio, TX</span>
    <a href="mailto:info@micahbellart.com">info@micahbellart.com</a>
  </footer>

</body>
</html>
