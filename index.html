<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micah Bell</title>
  <link rel="icon" type="image/png" href="images/MB-Favicon.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --orange: #FF6B00;
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #e8e8e8;
    }

    html {
      font-size: 16px;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* NAV */
    nav {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 2rem 2.5rem;
      gap: 2rem;
    }

    nav a {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    nav a:hover {
      color: var(--orange);
    }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 2rem 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .logo img {
      width: clamp(120px, 20vw, 220px);
      height: auto;
      display: block;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      margin-top: 0.5rem;
      opacity: 0.5;
    }

    /* PROJECT LIST */
    .projects {
      width: 100%;
      max-width: 900px;
      padding: 2rem 2rem 8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .project-link {
      display: block;
      width: 100%;
      text-decoration: none;
      color: var(--black);
      padding: 0.4rem 0;
      transition: color 0.15s;
      animation: fadeUp 0.6s ease both;
    }

    .project-link:hover {
      color: var(--orange);
    }

    .project-link:hover .arrow {
      transform: translateX(6px);
      color: var(--orange);
    }

    .project-inner {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.6rem;
    }

    .project-title {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .arrow {
      font-size: 1.2rem;
      transition: transform 0.2s ease, color 0.15s;
      color: var(--black);
      opacity: 0.3;
    }

    .project-link:hover .arrow {
      opacity: 1;
    }

    /* Staggered animation delays */
    .project-link:nth-child(1) { animation-delay: 0.05s; }
    .project-link:nth-child(2) { animation-delay: 0.1s; }
    .project-link:nth-child(3) { animation-delay: 0.15s; }
    .project-link:nth-child(4) { animation-delay: 0.2s; }
    .project-link:nth-child(5) { animation-delay: 0.25s; }
    .project-link:nth-child(6) { animation-delay: 0.3s; }
    .project-link:nth-child(7) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    footer {
      margin-top: auto;
      width: 100%;
      padding: 1rem 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1.5px solid var(--gray);
    }

    footer img {
      height: 28px;
      width: auto;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <nav>
    <a href="info.html">Info</a>
    <a href="https://instagram.com/micahbellart" target="_blank" aria-label="Instagram">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
    </a>
  </nav>

  <div class="hero">
    <div class="logo"><img src="images/MB-Logo.png" alt="Micah Bell" /></div>
    <div class="tagline">Thank you for your attention.</div>
  </div>

  <div class="projects">

    <a href="projects/wwdd.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">WWDD</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/timely-collection-vol-1.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Timely Collection — Vol 1.</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/here-come-the-blade-runners.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Here Come The Blade Runners</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/the-membership.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">The Membership</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/real-emotion.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Real Emotion</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/paramore.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Paramore</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/prints-of-peace.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">PRINTS OF PEACE</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a href="projects/music.html" class="project-link">
      <div class="project-inner">
        <span class="project-title">Music</span>
        <span class="arrow">→</span>
      </div>
    </a>

  </div>

  <footer>
    <img src="images/MB-Footer.png" alt="Micah Bell" />
  </footer>

</body>
</html>
