<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Here Come The Blade Runners — Micah Bell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #FF6B00;
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #e8e8e8;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      text-align: center;
    }

    /* NAV */
    nav {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 2.5rem;
      text-align: left;
    }

    .nav-back {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--orange); }

    .nav-right { display: flex; gap: 2rem; align-items: center; }

    .nav-right a {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }
    .nav-right a:hover { color: var(--orange); }

    /* PROJECT HEADER */
    .project-header {
      max-width: 700px;
      margin: 0 auto;
      padding: 3rem 2.5rem 3rem;
      animation: fadeUp 0.5s ease both;
    }

    /* The identity block — text title OR logo image swap in here */
    .project-identity {
      margin-bottom: 1.5rem;
    }

    /* Text title version (default) */
    .project-title {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    /* Logo image version — uncomment and swap .project-title for this:
       <img src="../images/your-project-logo.png" class="project-logo" alt="Project Name" />
    */
    .project-logo {
      max-width: 280px;
      max-height: 120px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .project-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .meta-tag {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    .project-description {
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 400;
      line-height: 1.65;
      opacity: 0.65;
      max-width: 520px;
      margin: 0 auto;
    }

    .content-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--orange);
      border-bottom: 1.5px solid var(--orange);
      padding-bottom: 0.1rem;
      margin-top: 1.25rem;
      transition: opacity 0.15s;
    }
    .content-link:hover { opacity: 0.6; }

    /* DIVIDER */
    .divider {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border: none;
      border-top: 1.5px solid var(--gray);
    }

    /* CONTENT AREA */
    .project-content {
      max-width: 700px;
      margin: 0 auto;
      padding: 3.5rem 2.5rem 8rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    .content-image {
      width: 100%;
      aspect-ratio: 1;
      background: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.3;
    }

    .content-image img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .content-text { margin-bottom: 3rem; }

    .content-text h2 {
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .content-text p {
      font-size: 0.9rem;
      font-weight: 400;
      line-height: 1.7;
      opacity: 0.65;
      max-width: 520px;
      margin: 0 auto;
    }

    /* FOOTER */
    footer {
      width: 100%;
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1.5px solid var(--gray);
      text-align: left;
    }

    footer span {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    footer a {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      opacity: 0.4;
      transition: opacity 0.15s, color 0.15s;
    }
    footer a:hover { opacity: 1; color: var(--orange); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-back">← All Work</a>
    <div class="nav-right">

      </a>
    </div>
  </nav>

  <div class="project-header">

    <div class="project-identity">
      <!-- OPTION A: Text title (default) -->
      <h1 class="project-title">Here Come The Blade Runners_HTML</h1>

      <!-- OPTION B: Logo image — delete the h1 above and uncomment this:
      <img src="../images/your-logo.png" class="project-logo" alt="Here Come The Blade Runners" />
      -->
    </div>

    <div class="project-meta">
      <span class="meta-tag">Illustration</span>
      <span class="meta-tag">Design</span>
      <span class="meta-tag">Animated GIFs</span>
      <span class="meta-tag">Twitter Essay</span>
    </div>

    <p class="project-description">
      A Twitter essay on censorship, Blade Runner, and the great attention auction of social media.
    </p>

    <a href="#" class="content-link">View Essay →</a>

  </div>

  <hr class="divider" />

  <!-- ============================================================
       CONTENT SECTION — Add your images, text, embeds below here
       ============================================================ -->
  <div class="project-content">

    <div class="content-grid">
      <div class="content-image">Image</div>
      <div class="content-image">Image</div>
      <div class="content-image">Image</div>
      <div class="content-image">Image</div>
    </div>

  </div>

  <footer>
    <span>Micah Bell — San Antonio, TX</span>
    <a href="mailto:info@micahbellart.com">info@micahbellart.com</a>
  </footer>

</body>
</html>
