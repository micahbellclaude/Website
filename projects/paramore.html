<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paramore — Micah Bell</title>
  <link rel="icon" type="image/png" href="../images/MB-Favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #FF6B00;
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #e8e8e8;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      text-align: center;
    }

    nav {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 2.5rem;
      text-align: left;
    }

    .nav-back {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--orange); }

    .nav-right { display: flex; gap: 2rem; align-items: center; }
    .nav-right a {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }
    .nav-right a:hover { color: var(--orange); }

    .project-header {
      max-width: 700px;
      margin: 0 auto;
      padding: 3rem 2.5rem 3rem;
      animation: fadeUp 0.5s ease both;
    }

    .project-identity { margin-bottom: 1.5rem; }

    .project-title {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    /* Logo image swap — delete h1 above and uncomment:
    <img src="../images/your-logo.png" class="project-logo" alt="Paramore" />
    */
    .project-logo {
      max-width: 280px;
      max-height: 120px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* Optional project image shown below title */
    .project-image {
      margin: 0 auto 1.5rem;
      max-height: 225px;
      width: auto;
      display: block;
      /* Uncomment and set src in HTML to activate:
         <img src="../images/your-image.jpg" class="project-image" alt="Paramore" />
      */
    }

    .project-description {
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 400;
      line-height: 1.65;
      opacity: 0.65;
      max-width: 520px;
      margin: 0 auto;
    }

    .divider {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border: none;
      border-top: 1.5px solid var(--gray);
    }

    .project-content {
      max-width: 700px;
      margin: 0 auto;
      padding: 3.5rem 2.5rem 8rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    .content-image {
      width: 100%;
      aspect-ratio: 1;
      background: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.3;
    }

    .content-image img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    footer {
      width: 100%;
      padding: 1rem 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1.5px solid var(--gray);
    }

    footer img {
      height: 28px;
      width: auto;
      opacity: 0.5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-back">← All Work</a>
    <div class="nav-right">
      <a href="../info.html">Info</a>
      <a href="https://instagram.com/micahbellart" target="_blank" aria-label="Instagram">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
    </div>
  </nav>

  <div class="project-header">
    <div class="project-identity">
      <h1 class="project-title">Paramore</h1>
      <!-- Logo swap: delete h1 above, uncomment below:
      <img src="../images/your-logo.png" class="project-logo" alt="Paramore" />
      -->
    </div>

    <!-- Project image (optional, 225px tall): uncomment to activate
    <img src="../images/your-image.jpg" class="project-image" alt="Paramore" />
    -->

    <p class="project-description">
      [Add your project description here]
    </p>
  </div>

  <hr class="divider" />

  <!-- ============================================================
       CONTENT SECTION — Add your images, text, embeds below here
       ============================================================ -->
  <div class="project-content">

    <div class="content-grid">
      <div class="content-image">Image</div>
      <div class="content-image">Image</div>
      <div class="content-image">Image</div>
      <div class="content-image">Image</div>
    </div>

  </div>

  <footer>
    <img src="../images/MB-Footer.png" alt="Micah Bell" />
  </footer>

</body>
</html>
